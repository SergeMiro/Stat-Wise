  </filter>
  <linearGradient id="tealGrad" x1="0" x2="1" y1="0" y2="1">
    <stop stop-color="#47AAA2"/>
    <stop offset="1" stop-color="#207A77"/>
  </linearGradient>
  <linearGradient id="skyGrad" x1="0" x2="0" y1="0" y2="1">
    <stop stop-color="#F1FBFA"/>
    <stop offset="1" stop-color="#E5F4F2"/>
  </linearGradient>
</defs>

<rect x="24" y="24" width="672" height="472" rx="34" fill="url(#skyGrad)"/>
<circle cx="585" cy="92" r="52" fill="#FFF0D6"/>
