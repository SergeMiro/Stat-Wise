<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
<title id="title">Preview of a StatWise neighbourhood result</title>
<desc id="desc">Editorial data illustration for the StatWise interface.</desc>
<defs>
