<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" role="img" aria-labelledby="title desc">
<title id="title">Alternative scenario cards</title>
<desc id="desc">Editorial data illustration for the StatWise interface.</desc>
<defs>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#18343A" flood-opacity=".12"/>
  </filter>
  <linearGradient id="tealGrad" x1="0" x2="1" y1="0" y2="1">
    <stop stop-color="#47AAA2"/>
    <stop offset="1" stop-color="#207A77"/>
  </linearGradient>
  <linearGradient id="skyGrad" x1="0" x2="0" y1="0" y2="1">
    <stop stop-color="#F1FBFA"/>
    <stop offset="1" stop-color="#E5F4F2"/>
  </linearGradient>
</defs>

<rect x="20" y="20" width="600" height="340" rx="30" fill="#F5FAFA"/>
